[Unit]
Description=WhatsApp API Gateway for Invoice Bot
After=network.target

[Service]
# User running the service
User=diego
# Directory where server.js is located
WorkingDirectory=/home/diego/invoice-whatsapp-web
# Command to start the server
ExecStart=/usr/bin/node server.js
# Restart policy: automatically restart if it crashes
Restart=always
RestartSec=10
# Environment variables for Chromium on Raspberry Pi
Environment=NODE_ENV=production
# Output logs to syslog for easy debugging
StandardOutput=syslog
StandardError=syslog
SyslogIdentifier=wa-server

[Install]
WantedBy=multi-user.target